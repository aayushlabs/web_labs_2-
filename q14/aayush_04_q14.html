<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clone and Remove Table Row</title>
</head>
<body>

    <h1>Product Table</h1>
    <hr>

    <button onclick="addRow()">Add New</button>

    <table border="1" cellpadding="8" id="productTable">
        <tr>
            <th>No</th>
            <th>Product</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Select Product</td>
            <td><input type="text"></td>
            <td><button onclick="removeRow(this)">Delete</button></td>
        </tr>
    </table>

    <script src="aayush_04_q14.js"></script>

</body>
</html>
