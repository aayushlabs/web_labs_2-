<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Types of JavaScript</title>
</head>
<body>

    <h1>Types of JavaScript</h1>
    <hr>

    <!-- Inline JavaScript -->
    <h2>1. Inline JavaScript</h2>
    <button onclick="alert('This is Inline JavaScript')">Click Me</button>

    <hr>

    <!-- Internal JavaScript -->
    <h2>2. Internal JavaScript</h2>
    <p id="internal"></p>

    <script>
        document.getElementById("internal").innerHTML = "This is Internal JavaScript";
    </script>

    <hr>

    <!-- External JavaScript -->
    <h2>3. External JavaScript</h2>
    <p id="external"></p>

    <script src="aayush_04_q1.js"></script>

</body>
</html>
