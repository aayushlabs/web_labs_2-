<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Button Events</title>
    <link rel="stylesheet" href="aayush_04_q15.css">
</head>
<body>

    <h1>Button Events on Paragraph</h1>
    <hr>

    <p id="para" style="font-size: 16px;">This is a sample paragraph.</p>

    <div class="buttons">
        <button onclick="changeBackground()">Change Background</button>
        <button onclick="changeParagraphBg()">Change Paragraph Background</button>
        <button onclick="hideParagraph()">Hide Paragraph</button>
        <button onclick="showParagraph()">Show Paragraph</button>
        <button onclick="increaseFont()">Increase font Size by 2pt</button>
        <button onclick="decreaseFont()">Decrease font Size by 2pt</button>
        <button onclick="resetFont()">Reset font into 12 pt.</button>
        <button onclick="changeColor()">Change Text Color</button>
    </div>

    <script src="aayush_04_q15.js"></script>

</body>
</html>
